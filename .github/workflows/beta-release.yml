name: Create Beta Release

on:
  push:
    tags:
      - 'v*-beta*'

jobs:
  create-beta-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create ZIP
        run: |
          zip -r "aldes-${{ github.ref_name }}.zip" custom_components/

      - name: Create Beta Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "Beta release ${{ github.ref_name }}" \
            --prerelease \
            "aldes-${{ github.ref_name }}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
